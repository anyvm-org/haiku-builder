
VM_ISO_LINK="https://mirrors.tnonline.net/haiku/haiku-release/r1beta5/haiku-r1beta5-x86_64-anyboot.iso"

VM_OS_NAME="haiku"
VM_SSH_PORT=2223

VM_ROOT_PASSWORD="anyvm.org"

VM_RELEASE=r1beta5

VM_SHUTDOWN_CMD="shutdown -q"

VM_INSTALL_CMD="pkgman install -y "


VM_RSYNC_PKG="rsync"
VM_SSHFS_PKG="sshfs_fuse"


VM_DISK="ide"


# sshfs_fuse can no longer come from the repo: upstream retired the
# haikuports r1beta5 branch repo (eu.hpkg.haiku-os.org/haikuports/r1beta5
# now 303s to master), and master's glib2 requires haiku>=r1~beta6,
# unsatisfiable on a beta5 base. The install script below therefore
# installs sshfs_fuse + glib2 from pinned beta5-era .hpkg files and the
# rest from the repo.
VM_PRE_INSTALL_PKGS="rsync sshfs_fuse tree cpio"
VM_INSTALL_SCRIPT="conf/haiku-r1beta5-pinned-sshfs.sh"

VM_LOGIN_TAG="Trash"

VM_OPTS="conf/haiku-r1beta5.opts.txt"



# nfs needs no guest package: Haiku ships the in-kernel nfs4 add-on
# (NFSv4.0 client, port= and proto=tcp supported), so existing published
# images gain it purely from the anyvm.py haiku mount branch. Verified
# locally 2026-07-23 (read + write-back, 4MB sha256 both directions).
#
# sshfs: sshfs_fuse is a userlandfs FUSE add-on (no sshfs CLI). The
# published v2.0.2 image ships it already; rebuilds get it from the
# pinned .hpkg files via VM_INSTALL_SCRIPT above. Requires anyvm >= the
# 2026-07-23 sync_sshfs haiku branch: the kernel's on-demand launch of
# userlandfs_server is broken on r1beta5 ("Bad port ID"), so anyvm
# pre-starts `userlandfs_server sshfs` before the userlandfs mount.
VM_SYNC_METHODS="rsync,scp,nfs,sshfs"



